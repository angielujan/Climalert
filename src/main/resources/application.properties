spring.application.name=climalert

# Pool de hilos para las tareas @Scheduled: sin esto comparten un unico hilo y pueden pisarse/retrasarse entre si.
spring.task.scheduling.pool.size=2

# Base de datos local (H2, archivo en disco)
spring.datasource.url=jdbc:h2:file:./data/climalert;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Envio de correo (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu_usuario@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_password_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuracion propia del dominio de Climalert
climalert.weather-api.base-url=https://api.weatherapi.com/v1
climalert.weather-api.api-key=${WEATHER_API_KEY:TU_API_KEY_AQUI}
climalert.weather-api.ubicacion=Buenos Aires

climalert.alertas.temperatura-umbral=35.0
climalert.alertas.humedad-umbral=60.0
climalert.alertas.destinatarios[0]=admin@clima.com
climalert.alertas.destinatarios[1]=emergencias@clima.com
climalert.alertas.destinatarios[2]=meteorologia@clima.com
climalert.alertas.remitente=no-reply@climalert.com

climalert.scheduling.obtencion-clima-cron=0 */5 * * * *
climalert.scheduling.analisis-alertas-cron=0 */1 * * * *